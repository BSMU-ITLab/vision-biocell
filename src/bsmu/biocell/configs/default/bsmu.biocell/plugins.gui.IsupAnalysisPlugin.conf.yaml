isup_grade_to_profile:
  1:
    risk: >
      При ПСА менее 10 нг/мл – низкий риск.
      При ПСА 10-20 нг/мл – промежуточный риск.
      Пятилетняя безрецидивная выживаемость достигает 97,5%.

    prognosis: >
      Благоприятный. У пациентов со стадией T1 опухоль, как правило, растёт медленно
      и ограничена пределами капсулы простаты.

    recommendation: >
      Активное наблюдение с регулярным контролем ПСА.
      Однако, если объём опухоли составляет более 50% столбика ткани или её
      протяжённость превышает 5 мм в одном столбике, необходимо приступить к раннему
      началу лечения, даже при условии, что сумма баллов по шкале Глисона не превышает 6.
      Возможно выполнение нервосберегающей операции.

  2:
    risk: >
      Промежуточный. Пятилетняя безрецидивная выживаемость достигает 93,1%.

    prognosis: >
      При ПСА менее 10 нг/мл и одностороннем поражении менее 50%
      доли предстательной железы – прогноз благоприятный.
      При ПСА 10-20 нг/мл – прогноз менее благоприятный.

    recommendation: >
      При низком ПСА, небольшом объёме опухоли и низком проценте участков
      с паттерном 4 по шкале Глисона допустимо активное наблюдение с контролем ПСА
      не реже, чем каждые 6 месяцев, пальцевым ректальным исследованием,
      МРТ таза с контрастированием. Также показана повторная биопсия через 12 мес.
      В иных случаях рекомендуется абляция всей предстательной железы или её части.
      Возможно выполнение нервосберегающей операции.

  3:
    risk: >
      При ПСА менее 20 нг/мл и стадии T1-T2 – неблагоприятный промежуточный риск.
      При ПСА более 20 нг/мл или стадии T3 – высокий риск.
      Пятилетняя безрецидивная выживаемость составляет около 80-85%.

    prognosis: >
      Умеренно неблагоприятный. Опухоль демонстрирует более агрессивное поведение,
      часто с прорастанием за пределы капсулы простаты.

    recommendation: >
      Радикальная простатэктомия или лучевая терапия в комбинации с андрогенной депривацией:<br>
      - при неблагоприятном промежуточном риске – краткосрочная (до 6 месяцев),<br>
      - при высоком риске – длительная (18-36 месяцев).<br>
      Нервосберегающий подход, как правило, не рекомендуется.
      Обязательна оценка лимфатических узлов и метастатического статуса.

  4:
    risk: >
      Очень высокий. Пятилетняя безрецидивная выживаемость составляет около 60-70%.

    prognosis: >
      Неблагоприятный. Характерен быстрый рост опухоли, частое поражение семенных
      пузырьков и окружающих тканей. Высока вероятность регионарного и дистантного
      метастазирования.

    recommendation: >
      Комбинированное лечение: радикальная простатэктомия с лимфаденэктомией
      или интенсифицированная лучевая терапия в сочетании с длительной андрогенной
      депривацией (18-36 месяцев). При наличии признаков системного заболевания –
      системная терапия с последующей оценкой возможности локального контроля.

  5:
    risk: >
      Крайне высокий. Пятилетняя безрецидивная выживаемость составляет менее 50%.

    prognosis: >
      Крайне неблагоприятный. Опухоль крайне агрессивна, часто диагностируется уже на стадии T3-T4
      с выраженным инвазивным ростом и/или наличием метастазов. Высока вероятность
      регионарного и дистантного метастазирования.

    recommendation: >
      Комбинированный подход:<br>
      - радикальная простатэктомия с лечением метастазов,<br>
      - на стадии T4 – лучевая и гормональная терапия.<br>
      При прогнозируемой продолжительности жизни менее 5 лет – выжидательная тактика
      или андрогенная депривация, или дистанционная лучевая терапия.<br>
      Рекомендуется визуализация метастатического поражения костей и иных органов:<br>
      - ПЭТ-КТ с F-фторидом натрия или холином,<br>
      - ПЭТ-КТ с 68Ga-ПСМА,<br>
      - ПЭТ-КТ с 18F-ПСМА,<br>
      - КТ органов грудной, брюшной полости и забрюшинного пространства.
